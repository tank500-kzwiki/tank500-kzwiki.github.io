name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for git info (timestamps)
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Cache Quartz plugins
        uses: actions/cache@v5
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-
      - name: Install Dependencies
        run: npm ci
      - name: Install Quartz plugins
        run: npx quartz plugin install
      - name: Patch explorer (top-level folders open by default)
        run: |
          node -e '
          const fs=require("fs"),path=require("path");
          const root=".quartz/plugins/explorer/dist";
          const FROM=`r[u.slug]!==void 0?r[u.slug]:!0`;
          const TO=`r[u.slug]!==void 0?r[u.slug]:t!==""`;
          const walk=d=>fs.readdirSync(d,{withFileTypes:true}).flatMap(e=>{const p=path.join(d,e.name);return e.isDirectory()?walk(p):[p];});
          let patched=0,already=0;
          for(const f of walk(root).filter(f=>f.endsWith(".js"))){
            let s=fs.readFileSync(f,"utf8");
            if(s.includes(FROM)){fs.writeFileSync(f,s.split(FROM).join(TO));patched++;console.log("  patched",f);}
            else if(s.includes(TO)){already++;}
          }
          if(patched===0&&already===0){console.error("::error::explorer patch target not found — plugin changed, review patch in deploy.yml");process.exit(1);}
          console.log(`explorer patch: ${patched} patched, ${already} already-patched`);
          '
      - name: Build Quartz
        run: npx quartz build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
